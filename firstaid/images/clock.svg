<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100" height="100" viewBox="0 0 100 100">
<defs>
    <animateTransform
        type="rotate"
        fill="remove"
        restart="always"
        calcMode="linear"
        accumulate="none"
        additive="sum"
        xlink:href="#hour"
        repeatCount="indefinite"
        dur="30s"
        to="360 50 50"
        from="0 50 50"
        attributeName="transform"
        attributeType="xml">
    </animateTransform>

    <animateTransform
        type="rotate"
        fill="remove"
        restart="always"
        calcMode="linear"
        accumulate="none"
        additive="sum"
        xlink:href="#minute"
        repeatCount="indefinite"
        dur="0.5s"
        to="360 50 50"
        from="0 50 50"
        attributeName="transform"
        attributeType="xml">
    </animateTransform>
</defs>
<circle cx="50" cy="50" r="46" stroke="#fff" stroke-width="4" fill="none" />
<line id="minute" stroke="#fff" stroke-width="4" x1="50" y1="50" x2="50" y2="12" />
<line id="hour" stroke="#fff" stroke-width="4" x1="50" y1="50" x2="50" y2="30" />
<circle cx="50" cy="50" r="2" fill="#fff" />
</svg>